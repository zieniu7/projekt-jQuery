<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Notatnik jQuery</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/jquery.dataTables.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-4">
    <h1 class="text-center">📒 Notatnik</h1>

    <button id="darkMode" class="btn btn-dark mb-3">🌙 Tryb ciemny</button>

    <form id="noteForm">
        <input type="text" name="title" id="title" placeholder="Tytuł" class="form-control mb-2">
        <textarea name="content" id="content" placeholder="Treść" class="form-control mb-2"></textarea>
        <input type="text" id="date" class="form-control mb-2" placeholder="Data">
        <button type="submit" class="btn btn-primary">Dodaj notatkę</button>
    </form>

    <hr>

    <input type="text" id="search" placeholder="Szukaj..." class="form-control mb-3">

    <table id="notesTable" class="display">
        <thead>
            <tr>
                <th>Tytuł</th>
                <th>Treść</th>
                <th>Data</th>
                <th>Akcje</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>

<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>

<script src="script.js"></script>

</body>
</html>
